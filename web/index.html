<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>System Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/style.css">

</head>

<body>

  <div id="app" class="container-fluid h-100">
    <div class="row h-100">

      <!-- CPU BLOCK -->
      <div class="col-6 d-flex">
        <div class="card w-100">
          <div id="cpuModel" class="model-label"></div>
          <div class="row h-100">

            <!-- CPU Donut -->
            <div class="col-8 d-flex flex-column align-items-center">
              <div class="cpu-model">CPU</div>
              <div class="donut-container">
                <canvas id="cpuLoadDonut"></canvas>
                <div id="cpuLoadText" class="donut-center-text"></div>
              </div>
            </div>

            <!-- RAM Bar -->
            <div class="col-4 d-flex flex-column align-items-center">
              <div class="ram-label">RAM</div>
              <div class="bar-card-container">
                <canvas id="ramBar"></canvas>
                <div id="ramText" class="bar-value-label"></div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- GPU BLOCK -->
      <div class="col-6 d-flex">
        <div class="card w-100">
          <div id="gpuModel" class="model-label"></div>
          <div class="row h-100">

            <!-- GPU Donut -->
            <div class="col-8 d-flex flex-column align-items-center">
              <div class="gpu-model">GPU</div>
              <div class="donut-container">
                <canvas id="gpuClockDonut"></canvas>
                <div id="gpuLoadText" class="donut-center-text"></div>
              </div>
            </div>

            <!-- VRAM Bar -->
            <div class="col-4 d-flex flex-column align-items-center">
              <div class="ram-label">VRAM</div>
              <div class="bar-card-container">
                <canvas id="vramBar"></canvas>
                <div id="vramText" class="bar-value-label"></div>
              </div>
            </div>

          </div>

        </div>
      </div>

    </div>
    <div class="row g-0">

      <div class="col-12 d-flex">
        <div class="card w-100" id="networkCard">

          <div class="row g-0">

            <!-- LEFT: Network -->

            <div class="col-9 d-flex flex-column align-items-stretch">

              <div class="net-label">Network</div>

              <div class="network-content">
                <div class="placeholder-box">
                  <canvas id="networkChart"></canvas>
                </div>
              </div>

            </div>


            <!-- RIGHT: Ping -->
            <div class="col-3 d-flex flex-column align-items-stretch">
              <div class="ping-container">

                <div id="pingText" class="ping-text">-- ms</div>

                <div id="netDownText" class="net-speed down">↓ --</div>
                <div id="netUpText" class="net-speed up">↑ --</div>

              </div>


            </div>

          </div>

        </div>
      </div>

    </div>

  </div>
  <!-- NETWORK BLOCK -->

  <!-- RAM -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


  <!-- Charts-API -->
  <script src="/charts.js"></script>

  <!-- App / Orchestrator -->
  <script src="/app.js"></script>

</body>

</html>
