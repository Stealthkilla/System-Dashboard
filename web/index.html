<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>System Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/style.css">

</head>
<body>
  
  <div id="app" class="container-fluid">
    <div class = "row">
      <!--CPU-->
      <div class ="col-6">
        <div class ="row">
          <div class ="col-8">
            <!-- Card CPU Load (DONUT)-->
            <div class="card">
              <!--FILL HERE-->
            </div>
          </div>
          <div class="col-4">
            <!--Card CPU Temp (VERTICAL BAR)-->
            <div class="card">
              <!--FILL HERE-->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- GPU -->
  <div class="col-6">
    <div class="row">
      <div class="col-8">
        <!-- Card: GPU Clock (Donut) -->
        <div class="card">
          <!--FILL HERE-->
        </div>
      </div>
      <div class="col-4">
        <!-- Card: GPU Temp (Vertical Bar) -->
        <div class="card">
          <!--FILL HERE-->
        </div>
      </div>
    </div>
  </div>
</div>

  <div class="card">
    <div>CPU: <span id="cpu">--</span> %</div>
    <div>RAM: <span id="ram">--</span> %</div>
    <div>GPU: <span id="gpu">--</span> %</div>
    <div>GPU Temp: <span id="gpuTemp">--</span> °C</div>
    <div>Status: <span id="status">init</span></div>
  </div>


<div class="bar-container">
  <div id="cpuBar" class="bar"></div>
</div>


  <canvas id="cpuChart" width="600" height="200"></canvas>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Deine App -->
  <script src="/app.js"></script>
</body>
</html>
